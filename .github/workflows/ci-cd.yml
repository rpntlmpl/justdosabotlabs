name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. Проверка линтером
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./Dockerfile
          ignore: DL3008 

  # 2. Сборка и Push
  build-and-push:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
          tags: |
            type=ref,event=branch
            latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # 3. Нагрузочное тестирование (Новая часть для Лабы №3)
  performance-tests:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run container for testing
        run: |
          # Запускаем контейнер локально в Runner на порту 8080
          docker run -d --name test-app -p 8080:80 ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest
          # Ждем пару секунд, пока Nginx проснется
          sleep 5

      - name: Run k6 Load Tests
        uses: grafana/k6-action@v0.3.1
        with:
          filename: tests/performance-tests.js

      - name: Stop and clean up
        if: always()
        run: docker stop test-app && docker rm test-app