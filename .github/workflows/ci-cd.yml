name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run HTML Hint
        run: |
          npm install -g htmlhint
          htmlhint index.html

  build-and-push:
    needs: linter
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/totaltarizm/project3:latest

  test-quality:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Website Container
        run: |
          docker run -d --name test_app -p 8080:80 ghcr.io/totaltarizm/project3:latest
          sleep 10

      - name: Run k6 Load Test
        run: |
          docker run --rm --network host -i -v ${{ github.workspace }}:/io -w /io grafana/k6 run load-test.js

      - name: Cleanup
        if: always()
        run: docker rm -f test_app || true